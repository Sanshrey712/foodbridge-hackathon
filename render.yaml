services:
  # ─── Backend API (FastAPI) ───────────────────────────────────────────────────
  - type: web
    name: foodbridge-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false   # you'll paste this in the Render dashboard
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ML_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: PYTHONPATH
        value: .

  # ─── ML Microservice (FastAPI) ───────────────────────────────────────────────
  - type: web
    name: foodbridge-ml
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r ml/requirements.txt
    startCommand: uvicorn ml.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ML_API_KEY
        sync: false
      - key: PYTHONPATH
        value: .
